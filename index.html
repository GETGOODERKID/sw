<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Space Waves</title>

  <link rel="stylesheet" href="style.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      width: 100%;
      height: 100%;
    }

    #unity-container {
      width: 100%;
      height: 100%;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: black;
    }

    #loading-cover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: sans-serif;
    }

    #bar {
      width: 0%;
      height: 10px;
      background: white;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>
  </div>

  <div id="loading-cover">
    <img src="logo.png" width="120">
    <div style="width:200px;border:1px solid white;margin-top:20px;">
      <div id="bar"></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("unity-canvas");
    const bar = document.getElementById("bar");
    const loading = document.getElementById("loading-cover");

    const loaderUrl = "d2ab453b101c38d0e73090352dc096a0.loader.js";

    const config = {
      dataUrl: "422a6648ccfa148611fd1ce9615800e4.data.unityweb",
      frameworkUrl: "438b66b1a9f7ec10e3d9204d554b281b.framework.js.unityweb",
      codeUrl: "29b8886e795652db3702b7c0d7a89a17.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "do.Games",
      productName: "Space Waves",
      productVersion: "1.0",
      matchWebGLToCanvasSize: true
    };

    let script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        bar.style.width = (progress * 100) + "%";
      }).then(() => {
        loading.style.display = "none";
      }).catch((err) => {
        console.error(err);
        alert("Unity failed to load. Check console.");
      });
    };

    document.body.appendChild(script);
  </script>

</body>
</html>
