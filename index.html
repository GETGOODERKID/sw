<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Space Waves</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>
  </div>

  <div id="loading-cover">
    <img src="logo.png" width="120">
    <div style="width:200px;height:10px;border:1px solid #fff;">
      <div id="bar" style="width:0%;height:100%;background:#fff;"></div>
    </div>
  </div>

  <script>
    const canvas = document.querySelector("#unity-canvas");
    const bar = document.querySelector("#bar");

    // IMPORTANT: NO Build/ folder
    const loaderUrl = "d2ab453b101c38d0e73090352dc096a0.loader.js";

    const config = {
      dataUrl: "422a6648ccfa148611fd1ce9615800e4.data.unityweb",
      frameworkUrl: "438b66b1a9f7ec10e3d9204d554b281b.framework.js.unityweb",
      codeUrl: "29b8886e795652db3702b7c0d7a89a17.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets"
    };

    let script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        bar.style.width = (progress * 100) + "%";
      }).then(() => {
        document.getElementById("loading-cover").style.display = "none";
      }).catch(console.error);
    };

    document.body.appendChild(script);
  </script>

</body>
</html>
